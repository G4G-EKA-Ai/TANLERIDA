# =============================================================================
# Google Cloud Build Configuration
# TANLERIDA - Build and Deploy Pipeline
# =============================================================================

steps:
  # ===========================================================================
  # Step 1: Install dependencies and build
  # ===========================================================================
  - name: 'node:20-alpine'
    id: 'install-and-build'
    dir: 'tangred'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npx prisma generate
        npm run build

  # ===========================================================================
  # Step 2: Run tests (if any)
  # ===========================================================================
  # - name: 'node:20-alpine'
  #   id: 'test'
  #   dir: 'tangred'
  #   args: ['npm', 'test']

  # ===========================================================================
  # Step 3: Build Docker image for Cloud Run
  # ===========================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tangred-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tangred-api:latest'
      - '-f'
      - 'gcp/cloud-run/Dockerfile'
      - '.'

  # ===========================================================================
  # Step 4: Push Docker image
  # ===========================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tangred-api:$COMMIT_SHA'

  # ===========================================================================
  # Step 5: Deploy to Cloud Run
  # ===========================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tangred-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tangred-api:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'DATABASE_URL=db-url:latest,AUTH_SECRET=auth-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,GOOGLE_GEMINI_API_KEY=gemini-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,PINECONE_API_KEY=pinecone-api-key:latest,CLOUDINARY_CLOUD_NAME=cloudinary-cloud-name:latest,CLOUDINARY_API_KEY=cloudinary-api-key:latest,CLOUDINARY_API_SECRET=cloudinary-api-secret:latest,RAZORPAY_KEY_ID=razorpay-key-id:latest,RAZORPAY_KEY_SECRET=razorpay-key-secret:latest,RESEND_API_KEY=resend-api-key:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_PUBLIC_APP_URL=https://tangred.in,FROM_EMAIL=noreply@tangred.in'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--service-account'
      - 'tangred-api@$PROJECT_ID.iam.gserviceaccount.com'

  # ===========================================================================
  # Step 6: Run database migrations
  # ===========================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'run-migrations'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Get Cloud SQL connection name
        CONNECTION_NAME=$(gcloud sql instances describe tangred-postgres --format='value(connectionName)')
        
        # Start Cloud SQL Proxy
        wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64 -O /workspace/cloud-sql-proxy
        chmod +x /workspace/cloud-sql-proxy
        
        # Run proxy in background
        /workspace/cloud-sql-proxy --unix-socket /cloudsql $CONNECTION_NAME &
        sleep 10
        
        # Run migrations
        cd tangred
        export DATABASE_URL="postgresql://tangred_app@/tangred_db?host=/cloudsql/$CONNECTION_NAME"
        npx prisma migrate deploy

  # ===========================================================================
  # Step 7: Build Frontend for Firebase
  # ===========================================================================
  - name: 'node:20-alpine'
    id: 'build-frontend'
    dir: 'tangred'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        # Update .env.production for static export
        echo "NEXT_PUBLIC_API_URL=https://tangred-api-xyz123-el.a.run.app" >> .env.production
        npm run build
        # Move standalone to dist for Firebase
        cp -r .next/standalone ../dist 2>/dev/null || cp -r .next ../dist

  # ===========================================================================
  # Step 8: Deploy to Firebase Hosting
  # ===========================================================================
  - name: 'gcr.io/$PROJECT_ID/firebase'
    id: 'deploy-firebase'
    args:
      - 'deploy'
      - '--project=$PROJECT_ID'
      - '--only=hosting'

# =============================================================================
# Images to store
# =============================================================================
images:
  - 'gcr.io/$PROJECT_ID/tangred-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/tangred-api:latest'

# =============================================================================
# Options
# =============================================================================
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: '20'

# =============================================================================
# Timeout
# =============================================================================
timeout: '3600s'

# =============================================================================
# Substitutions (can be overridden via command line)
# =============================================================================
substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: tangred-api
